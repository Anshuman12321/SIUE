services:
  back-end:
    build: ./back-end
    ports:
      - "8000:8000"
    env_file:
      - .env

  front-end:
    build:
      context: ./front-end
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "3000:80"
